services:
  - type: web
    name: universal-multimodal-agent-api
    runtime: docker
    dockerfilePath: ./docker/Dockerfile.backend
    dockerContext: .
    plan: starter
    healthCheckPath: /api/v1/health
    envVars:
      - key: CEREBRAS_API_KEY
        sync: false
      - key: CEREBRAS_BASE_URL
        value: https://api.cerebras.ai/v1
      - key: MODEL_NAME
        value: gemma-4-31b
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: WHISPER_MODEL
        value: base
      - key: INTENT_CONFIDENCE_THRESHOLD
        value: "0.65"
      - key: MAX_RETRIES
        value: "3"
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: '["*"]'
    disk:
      name: agent-data
      mountPath: /tmp
      sizeGB: 2

  - type: web
    name: universal-multimodal-agent-ui
    runtime: docker
    dockerfilePath: ./docker/Dockerfile.frontend
    dockerContext: .
    plan: starter
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: universal-multimodal-agent-api
          property: hostport
